<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FDP Calculator</title>
    <!-- Combined Typography Links -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e17">
</head>
<body>

    <!-- EFB Styled Header Layer -->
    <div class="header">
        <div class="header-icon">✈</div>
        <div>
            <div class="header-title">FDP Calculator</div>
            <div class="header-sub">Maximum Duty & Flight Time Limitations</div>
        </div>
    </div>

    <div class="app-container">
        <!-- INPUT CONTROL PANEL -->
        <div class="section">
            <div class="section-label">Duty Parameters</div>
            
            <div class="field">
                <label for="reportTime">Scheduled Report Time (Local)</label>
                <!-- type="text" with pattern avoids forced mobile scrolling wheels -->
                <input type="text" id="reportTime" placeholder="00:00" inputmode="numeric" maxlength="5" required>
            </div>

            <div class="field">
                <label for="crewType">Crew Configuration</label>
                <div class="custom-select-wrap">
                    <select id="crewType">
                        <option value="single_crew" selected>Single Crew</option>
                        <option value="augmented_3_pilots">Augmented (3 Pilots)</option>
                        <option value="double_4_pilots">Double (4 Pilots)</option>
                    </select>
                </div>
            </div>

            <!-- Inconspicuous Context Fields -->
            <div class="grid-2">
                <div class="field" id="sectorGroup">
                    <label for="sectors">Sectors</label>
                    <div class="custom-select-wrap">
                        <select id="sectors">
                            <option value="1-2" selected>1-2 Sectors</option>
                            <option value="3">3 Sectors</option>
                            <option value="4">4 Sectors</option>
                            <option value="5">5 Sectors</option>
                            <option value="6">6 Sectors</option>
                            <option value="7+">7+ Sectors</option>
                        </select>
                    </div>
                </div>

                <div class="field hidden" id="restGroup">
                    <label for="restClass">Rest Facility</label>
                    <div class="custom-select-wrap">
                        <select id="restClass">
                            <option value="Class 1">Class 1 Facility</option>
                            <option value="Class 2" selected>Class 2 Facility</option>
                            <option value="Class 3">Class 3 Facility</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- FLIGHT DECK READOUT (OUTPUTS) -->
        <div class="section">
            <div class="section-label">Operational Limits</div>
            <div class="output-card">
                <div class="main-output">
                    <label>Final On-Block Time</label>
                    <div id="finalOnBlock" class="value highlight">--:--</div>
                </div>
                
                <div class="secondary-outputs">
                    <div class="output-box">
                        <label>Max FDP</label>
                        <div id="maxFdp" class="value">--</div>
                    </div>
                    <div class="output-box">
                        <label>Max FLT</label>
                        <div id="maxFlt" class="value">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log("Offline Engine Ready"));
        }
    </script>
</body>
</html>
